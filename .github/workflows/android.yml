name: Build Android APK

# 云端构建德扑道场 Android 薄壳 APK，并发布到 Releases（固定标签 android-latest，永久直链）。
# 触发：改动 mobile/ 目录后 push，或在 Actions 页手动 Run workflow。
on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write   # 发布 Release 需要

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon / splash (if logo provided)
        run: |
          if [ -f assets/logo.png ]; then
            echo "found assets/logo.png → 生成图标/启动图"
            npx @capacitor/assets generate --android \
              --iconBackgroundColor '#2f4a3e' \
              --iconBackgroundColorDark '#2f4a3e' \
              --splashBackgroundColor '#2f4a3e' \
              --splashBackgroundColorDark '#0e1626'
          else
            echo "无 assets/logo.png，沿用默认图标"
          fi

      - name: Sync web assets
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk pokerdojo.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokerdojo-debug-apk
          path: mobile/pokerdojo.apk
          if-no-files-found: error

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: 德扑道场 Android（最新）
          body: |
            德扑道场 Poker Dojo 安卓安装包（debug/未签名，可直接侧载）。
            下载 `pokerdojo.apk` → 手机允许「安装未知来源应用」→ 安装。
            打开即加载线上最新版 https://pokerdojo.space。
            构建号：${{ github.run_number }} · 提交：${{ github.sha }}
          prerelease: true
          files: mobile/pokerdojo.apk
